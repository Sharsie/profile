name: build-push

on:
  push:
    branches: [main]
    tags: ['*']

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    container:
      # Instance-wide variable NIX_IMAGE_VERSION
      image: docksee/nixos-gitea:${{ vars.NIX_IMAGE_VERSION }}
    outputs:
      version: ${{ steps.push.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history + tags so the flake's version derivation works

      - name: Login to Docker Hub
        env:
          TOKEN_DOCKERHUB: ${{ secrets.TOKEN_DOCKERHUB }}
          USER_DOCKERHUB: ${{ secrets.USER_DOCKERHUB }}
        run: |
          echo "$TOKEN_DOCKERHUB" | \
            nix shell nixpkgs#crane --command \
              crane auth login docker.io -u "$USER_DOCKERHUB" --password-stdin

      - name: Build and push
        id: push
        run: |
          # `nix run .#push` prints `PUSHED_VERSION=<tag>` on its last interesting line.
          OUTPUT="$(nix run .#push)"
          echo "$OUTPUT"
          VERSION="$(echo "$OUTPUT" | grep '^PUSHED_VERSION=' | tail -1 | cut -d= -f2)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  bump-chart:
    # Bumps image.tag in the profile-chart repo so ArgoCD auto-syncs the new image.
    needs: push
    runs-on: ubuntu-latest
    container:
      image: docksee/nixos-gitea:${{ vars.NIX_IMAGE_VERSION }}
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    # Serialise chart-bump commits across parallel app pushes — two jobs racing
    # to push the same chart branch causes one to fail with non-fast-forward.
    concurrency:
      group: bump-chart-profile
      cancel-in-progress: false
    steps:
      - name: Bump image tag in chart repo
        env:
          TOKEN_GITEA_CHART_SERVICE_ACCOUNT: ${{ secrets.TOKEN_GITEA_CHART_SERVICE_ACCOUNT }}
          VERSION: ${{ needs.push.outputs.version }}
          CHART_REPO: git.c3c.cz/lukas-cech/profile-chart
        run: |
          set -euo pipefail
          # The chart-service-account service account on Gitea owns the bump commits.
          # Shared bot account; its PAT is provisioned as an org/instance secret
          # and reused across all app repos. Access to a given chart repo is
          # granted by adding chart-service-account as a Write collaborator on
          # that repo — Gitea PATs aren't repo-scoped.
          git config --global user.email "chart-service-account@lukas-cech"
          git config --global user.name  "chart-service-account"

          TMP="$(mktemp -d)"
          git clone "https://chart-service-account:${TOKEN_GITEA_CHART_SERVICE_ACCOUNT}@${CHART_REPO}.git" "$TMP/chart"
          cd "$TMP/chart"

          # Retry the bump up to 5 times: rebase on the latest main, re-apply the
          # tag edit, push. Covers the case where a parallel bump landed between
          # our clone and our push despite the workflow-level concurrency guard.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            nix shell nixpkgs#yq-go --command \
              yq -i ".image.tag = \"${VERSION}\"" values.yaml

            if git diff --quiet; then
              echo "image.tag already at ${VERSION}, nothing to commit"
              exit 0
            fi

            git add values.yaml
            git commit -m "chore: bump profile image to ${VERSION}"

            if git push origin HEAD:main; then
              echo "bumped on attempt ${attempt}"
              exit 0
            fi

            echo "push rejected (attempt ${attempt}), retrying after rebase"
          done

          echo "ERROR: failed to bump chart after 5 attempts" >&2
          exit 1
